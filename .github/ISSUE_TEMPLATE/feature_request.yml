name: Feature request / feedback
description: Something is missing, awkward, or confusing — or you have an idea.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔒 This issue will be PUBLIC

        Anyone can read it. **Leave out** structure names and locations, jump routes, staging
        systems, asset values, wallet balances, and anything from a URL after you sign in.
        **Crop or blur screenshots.**

        You can describe what you want without naming where your stuff is: *"a column showing which
        of my structures is low on fuel"* says everything, and gives nothing away.

        Not sure it's worth filing? [Ask on Discord](https://discord.gg/rybEwArwch) first — that is
        what it's for.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: |
        **Describe the problem, not the solution.** What are you doing today, and where does it get
        painful, slow, or confusing? Knowing what you are actually trying to achieve usually leads
        somewhere better than the fix either of us would have guessed.
      placeholder: |
        Every morning I check whether any of my industry jobs finished, and I have to open the page
        and read down the whole list to find them.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What would you like to see? (optional)
      description: If you already have an idea, say it — but the problem above matters more, and a
        good problem with no idea attached is a perfectly good issue.
      placeholder: A count of finished jobs on the home page, so I know whether it's worth looking.
    validations:
      required: false

  - type: input
    id: page
    attributes:
      label: Which page does this concern?
      description: Or "new page" / "not sure".
      placeholder: e.g. Industry, or Home
    validations:
      required: false

  - type: dropdown
    id: kind
    attributes:
      label: What kind of thing is this?
      options:
        - Something is missing (data I want isn't shown anywhere)
        - Something is awkward (it's there, but hard to get at)
        - Something is confusing (I misread it, or it misled me)
        - An idea for something new
        - Just feedback
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        **"This confused me" is a real report.** If a page misled you, that is a defect in the page,
        not in you — and it is worth filing even if you worked out what it meant in the end.

  - type: checkboxes
    id: opsec
    attributes:
      label: Before you submit
      options:
        - label: I have left out structure names, locations, routes, ISK figures, and anything from
            a signed-in URL — and my screenshot (if any) is cropped.
          required: true
